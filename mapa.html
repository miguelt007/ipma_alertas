<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa de Alertas IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #111; color: white; overflow: hidden; }
        #topbar { 
            background: #222; 
            padding: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 2px solid #444;
            padding-left: 20px;
            padding-right: 20px;
        }
        #map { height: calc(100vh - 65px); width: 100%; background: #1a1a1a; }
        
        .grupo-botoes { display: flex; gap: 8px; }
        
        .btn-dia {
            padding: 8px 15px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-dia:hover { background: #444; }
        .btn-dia.active { background: #007bff; border-color: #0056b3; }

        .legenda { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 12px; 
            color: #333; 
            border-radius: 8px; 
            font-size: 13px; 
            line-height: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .legenda i { width: 16px; height: 16px; float: left; margin-right: 10px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="font-size: 18px; font-weight: bold; color: #eee;">ALERTAS IPMA</div>
    <div class="grupo-botoes">
        <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
        <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
        <button class="btn-dia" onclick="mudarDia(2, this)">+2 DIAS</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const areaInfo = {
    "AVR": "Aveiro", "BJA": "Beja", "BRG": "Braga", "BGC": "Bragança",
    "CBO": "Castelo Branco", "CBR": "Coimbra", "EVR": "Évora", "FAR": "Faro",
    "GDA": "Guarda", "LRA": "Leiria", "LSB": "Lisboa", "PTG": "Portalegre",
    "PTO": "Porto", "STM": "Santarém", "STB": "Setúbal", "VCT": "Viana do Castelo",
    "VRL": "Vila Real", "VIS": "Viseu"
};

const map = L.map('map', { zoomSnap: 0.1 }).setView([39.6, -8.1], 6.2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

let dadosAvisos = [];
let geoJsonData = null;
let diaAtual = 0;

// FUNÇÃO CRÍTICA: Remove acentos e padroniza para comparação
function normalizar(texto) {
    if (!texto) return "";
    return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
}

async function inicializar() {
    try {
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
        dadosAvisos = await resAvisos.json();

        const resGeo = await fetch('distritos.geojson');
        geoJsonData = await resGeo.json();

        renderizar(0);
    } catch (err) {
        console.error("Erro ao carregar dados:", err);
    }
}

function renderizar(diaIdx) {
    diaAtual = diaIdx;
    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
    const dataStr = dataAlvo.toISOString().split('T')[0];

    if (window.camada) map.removeLayer(window.camada);

    window.camada = L.geoJSON(geoJsonData, {
        style: function(f) {
            const nomeMapa = f.properties.Distrito || f.properties.distrito || f.properties.name || "";
            const nivel = obterMaxAviso(nomeMapa, dataStr);
            return { fillColor: cores[nivel], fillOpacity: 0.7, color: "#222", weight: 1.5 };
        },
        onEachFeature: function(f, l) {
            const nomeMapa = f.properties.Distrito || f.properties.distrito || f.properties.name || "";
            const nivel = obterMaxAviso(nomeMapa, dataStr);
            l.bindPopup(`<b>${nomeMapa}</b><br>Estado: <span style="color:${cores[nivel] === '#ffff00' ? '#999000' : cores[nivel]}">${nivel.toUpperCase()}</span>`);
        }
    }).addTo(map);
}

function obterMaxAviso(nomeDistrito, dataStr) {
    let max = 'green';
    const nomeMapaNorm = normalizar(nomeDistrito);

    dadosAvisos.forEach(aviso => {
        const nomeOficial = areaInfo[aviso.idAreaAviso];
        if (nomeOficial && normalizar(nomeOficial) === nomeMapaNorm && aviso.startTime.startsWith(dataStr)) {
            if (pesos[aviso.awarenessLevelID] > pesos[max]) {
                max = aviso.awarenessLevelID;
            }
        }
    });
    return max;
}

function mudarDia(dia, elemento) {
    document.querySelectorAll('.btn-dia').forEach(btn => btn.classList.remove('active'));
    elemento.classList.add('active');
    renderizar(dia);
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = function () {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = '<b>Avisos IPMA</b><br>' +
        '<i style="background:#ff3333"></i> Vermelho<br>' +
        '<i style="background:#ff9900"></i> Laranja<br>' +
        '<i style="background:#ffff00"></i> Amarelo<br>' +
        '<i style="background:#2ecc71"></i> Sem Alerta';
    return div;
};
legenda.addTo(map);

inicializar();
</script>
</body>
</html>
