<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa IPMA - Portugal e Açores</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #111; color: white; }
        #topbar { background: #222; padding: 15px; text-align: center; border-bottom: 2px solid #444; }
        #map { height: 85vh; width: 100%; background: #1a1a1a; }
        .legenda { background: white; padding: 10px; color: #333; border-radius: 8px; font-size: 12px; line-height: 18px; }
        .legenda i { width: 14px; height: 14px; float: left; margin-right: 8px; border: 1px solid #999; }
        select { padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="font-size:20px; font-weight:bold;">ALERTA METEOROLÓGICO IPMA</div>
    <div id="status" style="font-size:13px; color:#aaa; margin: 5px 0;">A carregar mapas e avisos...</div>
    <select id="selecaoDia">
        <option value="0">HOJE</option>
        <option value="1">AMANHÃ</option>
        <option value="2">DEPOIS DE AMANHÃ</option>
    </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// Configuração do Mapa (Centrado para apanhar o Atlântico)
const map = L.map('map').setView([38.5, -15.0], 5); 
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const areaInfo = {
    // Continente
    "AVR": "Aveiro", "BJA": "Beja", "BRG": "Braga", "BGC": "Bragança",
    "CBO": "Castelo Branco", "CBR": "Coimbra", "EVR": "Évora", "FAR": "Faro",
    "GDA": "Guarda", "LRA": "Leiria", "LSB": "Lisboa", "PTG": "Portalegre",
    "PTO": "Porto", "STM": "Santarém", "STB": "Setúbal", "VCT": "Viana do Castelo",
    "VRL": "Vila Real", "VIS": "Viseu",
    // Açores (Mapeamento para os teus novos ficheiros)
    "AOC": "Açores (Grupo Ocidental)", "ACZ": "Açores (Grupo Ocidental)",
    "ACE": "Açores (Grupo Central)", "ACG": "Açores (Grupo Central)",
    "AOR": "Açores (Grupo Oriental)", "ACL": "Açores (Grupo Oriental)",
    // Madeira
    "MCN": "Madeira (Costa Norte)", "MRM": "Madeira (Regiões Montanhosas)",
    "MCS": "Madeira (Costa Sul)", "MPS": "Madeira (Porto Santo)"
};

const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

let dadosAvisos = [];
let todasGeometrias = [];

async function carregarTudo() {
    try {
        // 1. Carregar Avisos (URL da tua tabela)
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
        dadosAvisos = await resAvisos.json();

        // 2. Carregar todos os GeoJSONs ao mesmo tempo
        const ficheiros = [
            'distritos.geojson',
            'AcoresCentralIlhas.geojson',
            'AcoresOcidentalIlhas.geojson',
            'AcoresOrientalIlhas.geojson'
        ];

        const respostas = await Promise.all(ficheiros.map(f => fetch(f).then(r => r.json())));
        
        // Juntar todas as "features" num único array
        todasGeometrias = respostas.flatMap(json => json.features);

        renderizarMapa(0);
        document.getElementById('selecaoDia').onchange = (e) => renderizarMapa(e.target.value);

    } catch (err) {
        document.getElementById("status").innerHTML = "Erro ao carregar ficheiros GeoJSON ou API.";
        console.error(err);
    }
}

function renderizarMapa(diaIdx) {
    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
    const dataStr = dataAlvo.toISOString().split('T')[0];
    document.getElementById("status").innerHTML = "Avisos para: " + dataAlvo.toLocaleDateString('pt-PT');

    if (window.camada) map.removeLayer(window.camada);

    // Criamos a camada com todas as geometrias juntas
    window.camada = L.geoJSON(todasGeometrias, {
        style: function(f) {
            // Verificamos o nome no GeoJSON (Pode ser 'distrito', 'name' ou 'Nome')
            const nome = (f.properties.distrito || f.properties.name || f.properties.Distrito || f.properties.Nome || "").trim();
            const nivel = obterRisco(nome, dataStr);
            return { fillColor: cores[nivel], fillOpacity: 0.7, color: "#444", weight: 1 };
        },
        onEachFeature: function(f, l) {
            const nome = (f.properties.distrito || f.properties.name || f.properties.Distrito || f.properties.Nome || "").trim();
            const nivel = obterRisco(nome, dataStr);
            l.bindPopup(`<b>${nome}</b><br>Alerta: ${nivel.toUpperCase()}`);
        }
    }).addTo(map);
}

function obterRisco(nomeMapa, dataStr) {
    let max = 'green';
    dadosAvisos.forEach(a => {
        const nomeIPMA = areaInfo[a.idAreaAviso] || "";
        if (nomeIPMA.toUpperCase() === nomeMapa.toUpperCase() && a.startTime.startsWith(dataStr)) {
            if (pesos[a.awarenessLevelID] > pesos[max]) max = a.awarenessLevelID;
        }
    });
    return max;
}

// Legenda
const legend = L.control({position: 'bottomright'});
legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = '<b>Avisos IPMA</b><br>' +
        '<i style="background:#ff3333"></i> Vermelho<br><i style="background:#ff9900"></i> Laranja<br>' +
        '<i style="background:#ffff00"></i> Amarelo<br><i style="background:#2ecc71"></i> Sem Risco';
    return div;
};
legend.addTo(map);

carregarTudo();
</script>
</body>
</html>
