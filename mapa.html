<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa de Alertas IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #111; color: white; }
        #topbar { background: #222; padding: 15px; text-align: center; border-bottom: 1px solid #444; }
        #map { height: 80vh; width: 100%; }
        .legenda { background: white; padding: 10px; color: #333; border-radius: 5px; font-size: 12px; }
        .legenda i { width: 15px; height: 15px; float: left; margin-right: 8px; border: 1px solid #999; }
    </style>
</head>
<body>

<div id="topbar">
    <div id="titulo" style="font-size:20px; font-weight:bold;">Alertas Meteorológicos IPMA</div>
    <div id="info-data" style="color:#bbb; margin-top:5px;">A carregar dados...</div>
    <select id="selecaoDia" style="margin-top:10px; padding:5px;">
        <option value="0">Hoje</option>
        <option value="1">Amanhã</option>
        <option value="2">Depois de Amanhã</option>
    </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// 1. Configurar Mapa
const map = L.map('map').setView([39.5, -8.0], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© IPMA | OpenStreetMap'
}).addTo(map);

const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

let dadosAvisos = [];
let nomesIPMA = {}; 

async function inicializar() {
    try {
        // A. API Nomes (CORS Proxy se necessário, mas IPMA costuma aceitar)
        const resNomes = await fetch('https://api.ipma.pt/open-data/distrits-islands.json');
        const jsonNomes = await resNomes.json();
        jsonNomes.data.forEach(item => {
            nomesIPMA[item.idAreaAviso] = item.local.toUpperCase();
        });

        // B. API Avisos
        const resAvisos = await fetch('https://api.ipma.pt/open-data/warnings_www.json');
        dadosAvisos = await resAvisos.json();

        // C. O Teu GeoJSON (Certifica-te que o nome do ficheiro está exato)
        const resGeo = await fetch('distritos.geojson');
        const geoJson = await resGeo.json();

        function renderizar(diaIdx) {
            const dataAlvo = new Date();
            dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
            const dataStr = dataAlvo.toISOString().split('T')[0];
            
            document.getElementById("info-data").innerHTML = "Previsão para: " + dataAlvo.toLocaleDateString('pt-PT');

            if (window.camada) map.removeLayer(window.camada);

            window.camada = L.geoJSON(geoJson, {
                style: function(feature) {
                    // AJUSTE: Aqui lemos a propriedade "Distrito" ou "distrito" do teu ficheiro
                    const nomeMapa = (feature.properties.Distrito || feature.properties.distrito || "").toUpperCase();
                    const nivel = buscarNivelGrave(nomeMapa, dataStr);
                    return { fillColor: cores[nivel] || cores['green'], fillOpacity: 0.7, color: "#444", weight: 1 };
                },
                onEachFeature: function(feature, layer) {
                    const nome = (feature.properties.Distrito || feature.properties.distrito || "").toUpperCase();
                    const nivel = buscarNivelGrave(nome, dataStr);
                    layer.bindPopup(`<b>${nome}</b><br>Aviso: ${nivel.toUpperCase()}`);
                }
            }).addTo(map);
        }

        renderizar(0);
        document.getElementById('selecaoDia').onchange = (e) => renderizar(e.target.value);

    } catch (err) {
        console.error("Erro detalhado:", err);
        document.getElementById("info-data").innerHTML = "Erro ao carregar dados. Se estiveres no PC, sobe para o GitHub para testar.";
    }
}

function buscarNivelGrave(nomeDistrito, dataStr) {
    let max = 'green';
    dadosAvisos.forEach(a => {
        if (nomesIPMA[a.idAreaAviso] === nomeDistrito && a.startTime.startsWith(dataStr)) {
            if (pesos[a.awarenessLevelID] > pesos[max]) max = a.awarenessLevelID;
        }
    });
    return max;
}

inicializar();
</script>
</body>
</html>
