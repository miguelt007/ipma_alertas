<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alertas Meteorológicos IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #111; color: white; }
        #topbar { background: #222; padding: 15px; text-align: center; border-bottom: 1px solid #444; }
        #titulo { font-size: 22px; font-weight: bold; color: #fff; }
        #data { font-size: 14px; color: #bbb; margin-top: 5px; }
        #map { height: 85vh; width: 100%; }
        
        /* Legenda flutuante */
        .legenda {
            background: white;
            padding: 12px;
            line-height: 18px;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            font-size: 13px;
        }
        .legenda i {
            width: 16px;
            height: 16px;
            float: left;
            margin-right: 8px;
            opacity: 0.8;
            border: 1px solid #999;
        }
    </style>
</head>
<body>

<div id="topbar">
    <div id="titulo">Alertas Meteorológicos IPMA</div>
    <div id="data">A atualizar avisos...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// 1. Configurar o Mapa
const map = L.map('map').setView([39.5, -8.0], 7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© IPMA | OpenStreetMap'
}).addTo(map);

// 2. Variáveis de Estado
let camadaGeo;
let avisosAtivos = [];
let dicionarioDicos = {};

// Cores e Níveis
const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

async function iniciar() {
    try {
        // PASSO A: Carregar o dicionário que colaste (Distritos/Ilhas)
        const resDicos = await fetch('https://api.ipma.pt/open-data/distrits-islands.json');
        const dataDicos = await resDicos.json();
        
        // Criar mapeamento Sigla -> Nome (Ex: "LSB" -> "Lisboa")
        dataDicos.data.forEach(item => {
            dicionarioDicos[item.idAreaAviso] = item.local;
        });

        // PASSO B: Carregar Avisos do IPMA
        const resAvisos = await fetch('https://api.ipma.pt/open-data/warnings_www.json');
        avisosAtivos = await resAvisos.json();
        
        document.getElementById("data").innerHTML = "Atualizado em: " + new Date().toLocaleString('pt-PT');

        // PASSO C: Carregar o Teu GeoJSON de Distritos
        // Certifica-te que o ficheiro está na mesma pasta do GitHub
        const resGeo = await fetch("distritos.geojson"); 
        const geoJsonData = await resGeo.json();

        renderizarMapa(geoJsonData);

    } catch (err) {
        document.getElementById("data").innerHTML = "Erro ao carregar dados da API";
        console.error(err);
    }
}

function renderizarMapa(dados) {
    camadaGeo = L.geoJSON(dados, {
        style: function(feature) {
            // AJUSTE: Troca 'name' pelo nome da propriedade no teu GeoJSON
            const nomeNoMapa = feature.properties.name || feature.properties.NOME_1;
            const nivel = obterNivelMaximo(nomeNoMapa);
            
            return {
                fillColor: cores[nivel] || cores['green'],
                fillOpacity: 0.6,
                color: "#444",
                weight: 1
            };
        },
        onEachFeature: function(feature, layer) {
            const nome = feature.properties.name || feature.properties.NOME_1;
            const nivel = obterNivelMaximo(nome);
            
            let popupContent = `<strong>${nome}</strong><br>Estado: ${traduzirNivel(nivel)}`;
            
            // Adicionar detalhes se houver aviso
            const infoAviso = avisosAtivos.find(a => dicionarioDicos[a.idAreaAviso] === nome);
            if(infoAviso && nivel !== 'green') {
                popupContent += `<br><small>Aviso: ${infoAviso.awarenessTypeName}</small>`;
            }

            layer.bindPopup(popupContent);
            
            layer.on({
                mouseover: (e) => { e.target.setStyle({ fillOpacity: 0.8, weight: 2, color: '#fff' }); },
                mouseout: (e) => { camadaGeo.resetStyle(e.target); }
            });
        }
    }).addTo(map);
}

// Encontra o aviso mais grave para o nome do distrito
function obterNivelMaximo(nomeDistrito) {
    let maxNivel = 'green';
    
    avisosAtivos.forEach(aviso => {
        const nomeDaApi = dicionarioDicos[aviso.idAreaAviso];
        if (nomeDaApi === nomeDistrito) {
            if (pesos[aviso.awarenessLevelID] > pesos[maxNivel]) {
                maxNivel = aviso.awarenessLevelID;
            }
        }
    });
    return maxNivel;
}

function traduzirNivel(n) {
    return { 'red': 'Vermelho', 'orange': 'Laranja', 'yellow': 'Amarelo' }[n] || 'Sem Avisos Ativos';
}

// Adicionar Legenda
const legenda = L.control({position: 'bottomright'});
legenda.onAdd = function() {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = `
        <strong style="margin-bottom:5px; display:block">Avisos Meteorológicos</strong>
        <i style="background:${cores.red}"></i> Vermelho<br>
        <i style="background:${cores.orange}"></i> Laranja<br>
        <i style="background:${cores.yellow}"></i> Amarelo<br>
        <i style="background:${cores.green}"></i> Sem Avisos
    `;
    return div;
};
legenda.addTo(map);

iniciar();
</script>

</body>
</html>
