<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Avisos IPMA - Portugal Total</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #111; color: white; overflow-x: hidden; }
        #topbar { background: #222; padding: 15px; text-align: center; border-bottom: 2px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #map { height: 75vh; width: 100%; background: #1a1a1a; }
        #debug-log { height: 10vh; overflow-y: auto; background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 11px; padding: 10px; border-top: 1px solid #444; }
        .controles { margin-top: 12px; }
        button { padding: 8px 15px; margin: 2px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 4px; transition: 0.3s; }
        button:hover { background: #555; border-color: #888; }
        select { padding: 7px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
        .legenda { background: rgba(255,255,255,0.95); padding: 12px; color: #333; border-radius: 8px; font-size: 13px; line-height: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
        .legenda i { width: 16px; height: 16px; float: left; margin-right: 10px; border-radius: 3px; border: 1px solid #777; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="font-size:22px; font-weight:bold; letter-spacing: 1px;">AVISOS METEOROLÓGICOS IPMA</div>
    <div id="status" style="font-size:13px; color:#aaa; margin-top: 5px;">A carregar sistemas...</div>
    
    <div class="controles">
        <select id="selecaoDia">
            <option value="0">Previsão para HOJE</option>
            <option value="1">Previsão para AMANHÃ</option>
            <option value="2">Depois de AMANHÃ</option>
        </select>
        <button onclick="map.setView([39.5, -8.0], 7)">Continente</button>
        <button onclick="map.setView([38.5, -28.0], 7)">Açores</button>
        <button onclick="map.setView([32.7, -16.9], 10)">Madeira</button>
    </div>
</div>

<div id="map"></div>
<div id="debug-log">Consola de Diagnóstico:</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- CONFIGURAÇÃO INICIAL ---
const log = (msg) => { 
    const el = document.getElementById('debug-log');
    el.innerHTML += `<br>> ${msg}`; 
    el.scrollTop = el.scrollHeight;
};

const map = L.map('map').setView([39.5, -8.0], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© IPMA | OpenStreetMap'
}).addTo(map);

// Mapeamento IPMA -> Nomes nos ficheiros GeoJSON (NAME_1)
const areaInfo = {
    "AVR":"Aveiro","BJA":"Beja","BRG":"Braga","BGC":"Bragança","CBO":"Castelo Branco","CBR":"Coimbra",
    "EVR":"Évora","FAR":"Faro","GDA":"Guarda","LRA":"Leiria","LSB":"Lisboa","PTG":"Portalegre",
    "PTO":"Porto","STM":"Santarém","STB":"Setúbal","VCT":"Viana do Castelo","VRL":"Vila Real","VIS":"Viseu",
    // No ficheiro dev-mms, os Açores e Madeira usam o nome em Inglês/Base
    "AOC":"Azores","ACZ":"Azores","ACE":"Azores","ACG":"Azores","AOR":"Azores","ACL":"Azores",
    "MCN":"Madeira","MRM":"Madeira","MCS":"Madeira","MPS":"Madeira"
};

const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

let dadosAvisos = [];
let todasGeometrias = [];

// --- FUNÇÕES DE CARREGAMENTO ---

async function carregarTudo() {
    // URLs via JSDelivr (CDN estável e sem erros de CORS)
    const urls = [
        "https://cdn.jsdelivr.net/gh/dev-mms/portugal-geojson@master/data/distritos.geojson",
        "https://cdn.jsdelivr.net/gh/dev-mms/portugal-geojson@master/data/acores.geojson",
        "https://cdn.jsdelivr.net/gh/dev-mms/portugal-geojson@master/data/madeira.geojson"
    ];

    try {
        log("A ligar à API do IPMA...");
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
        dadosAvisos = await resAvisos.json();
        log(`Sucesso: ${dadosAvisos.length} avisos recebidos.`);

        for (const url of urls) {
            log(`A carregar mapa: ${url.split('/').pop()}...`);
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                
                if (data.features) {
                    todasGeometrias = todasGeometrias.concat(data.features);
                    log(`OK: ${data.features.length} polígonos adicionados.`);
                }
            } catch (e) {
                log(`ERRO ao carregar ficheiro: ${e.message}`);
            }
        }

        if (todasGeometrias.length > 0) {
            renderizar(0);
            document.getElementById("status").innerHTML = "SISTEMA OPERACIONAL";
            log("Mapa renderizado com sucesso.");
        } else {
            log("FALHA CRÍTICA: Nenhuma geometria disponível.");
        }

        document.getElementById('selecaoDia').onchange = (e) => renderizar(e.target.value);

    } catch (err) {
        log("ERRO GLOBAL: " + err.message);
        document.getElementById("status").innerHTML = "ERRO DE LIGAÇÃO";
    }
}

// --- FUNÇÕES DE RENDERIZAÇÃO ---

function renderizar(diaIdx) {
    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
    const dataStr = dataAlvo.toISOString().split('T')[0];

    if (window.camada) map.removeLayer(window.camada);

    window.camada = L.geoJSON(todasGeometrias, {
        style: function(f) {
            const nomeMapa = f.properties.NAME_1 || f.properties.name || f.properties.distrito || "";
            const nivel = obterNivel(nomeMapa, dataStr);
            return { 
                fillColor: cores[nivel], 
                fillOpacity: 0.75, 
                color: "#222", 
                weight: 1.5 
            };
        },
        onEachFeature: function(f, l) {
            const nomeMapa = f.properties.NAME_1 || f.properties.name || f.properties.distrito || "";
            const nivel = obterNivel(nomeMapa, dataStr);
            l.bindPopup(`
                <div style="color:#333; font-family:sans-serif;">
                    <b style="font-size:14px;">${nomeMapa}</b><br>
                    Estado: <span style="color:${cores[nivel]}; font-weight:bold;">${nivel.toUpperCase()}</span>
                </div>
            `);
        }
    }).addTo(map);
}

function obterNivel(nomeMapa, dataStr) {
    let max = 'green';
    const norm = (s) => s ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : "";
    const nomeM = norm(nomeMapa);

    dadosAvisos.forEach(a => {
        const nomeOficial = norm(areaInfo[a.idAreaAviso] || "");
        // Verifica se o nome coincide e se o aviso começa na data selecionada
        if (nomeOficial === nomeM && a.startTime.startsWith(dataStr)) {
            if (pesos[a.awarenessLevelID] > pesos[max]) {
                max = a.awarenessLevelID;
            }
        }
    });
    return max;
}

// --- LEGENDA ---
const legend = L.control({position: 'bottomright'});
legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = '<b>Avisos IPMA</b><br>' +
        '<i style="background:#ff3333"></i> Vermelho (Extremo)<br>' +
        '<i style="background:#ff9900"></i> Laranja (Moderado)<br>' +
        '<i style="background:#ffff00"></i> Amarelo (Beira)<br>' +
        '<i style="background:#2ecc71"></i> Verde (Sem Alerta)';
    return div;
};
legend.addTo(map);

carregarTudo();
</script>
</body>
</html>
