<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Alertas Continente</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #111; color: white; overflow: hidden; }
        #topbar { background: #222; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #444; }
        #map { height: calc(100vh - 60px); width: 100%; background: #1a1a1a; }
        .nav-regioes { display: flex; gap: 15px; border-right: 1px solid #444; padding-right: 20px; }
        .nav-regioes a { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .nav-regioes a.active { color: #fff; border-bottom: 2px solid #007bff; }
        .grupo-botoes { display: flex; gap: 8px; }
        .btn-dia { padding: 8px 15px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-dia.active { background: #007bff; border-color: #0056b3; }
        .leaflet-popup-content-wrapper { background: #222; color: white; border-radius: 8px; width: 320px; border: 1px solid #444; }
        .popup-titulo { font-size: 15px; border-bottom: 1px solid #444; margin-bottom: 8px; display: block; color: #007bff; font-weight: bold; }
        .aviso-item { margin-bottom: 10px; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        .aviso-tempo { font-size: 11px; color: #ffcc00; display: block; font-family: monospace; }
        .aviso-desc { font-size: 11px; color: #ccc; display: block; line-height: 1.4; margin-top: 4px; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="nav-regioes">
            <a href="mapa.html" class="active">Continente</a>
            <a href="madeira.html">Madeira</a>
            <a href="acores.html">Açores</a>
        </div>
        <span style="font-weight: bold;">IPMA - PORTUGAL</span>
    </div>
    <div class="grupo-botoes">
        <button id="btn0" class="btn-dia active" onclick="mudarDia(0)">HOJE</button>
        <button id="btn1" class="btn-dia" onclick="mudarDia(1)">AMANHÃ</button>
        <button id="btn2" class="btn-dia" onclick="mudarDia(2)">+2 DIAS</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const cores = { 'green': '#2ecc71', 'yellow': '#ffff00', 'orange': '#ff9900', 'red': '#ff3333' };
const pesos = { 'green': 0, 'yellow': 1, 'orange': 2, 'red': 3 };

// Mapeamento infalível: Nome do Distrito no GeoJSON -> RegCode da API
const distritosIdMap = {
    "AVEIRO": "AVR", "BEJA": "BJA", "BRAGA": "BRG", "BRAGANCA": "BGC", 
    "CASTELO BRANCO": "CBO", "COIMBRA": "CBR", "EVORA": "EVR", "FARO": "FAR", 
    "GUARDA": "GDA", "LEIRIA": "LRA", "LISBOA": "LSB", "PORTALEGRE": "PTG", 
    "PORTO": "PTO", "SANTAREM": "STM", "SETUBAL": "STB", 
    "VIANA DO CASTELO": "VCT", "VILA REAL": "VRL", "VISEU": "VIS"
};

const map = L.map('map').setView([39.6, -8.1], 6.5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let dadosAvisos = [];
let geoJsonData = null;
let diaAtualIdx = 0;

function normalizar(t) { 
    return t ? t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : ""; 
}

async function inicializar() {
    try {
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json?t=' + Date.now());
        dadosAvisos = await resAvisos.json();
        const resGeo = await fetch('distritos.geojson');
        geoJsonData = await resGeo.json();
        renderizar();
    } catch (err) { console.error("Erro ao carregar dados."); }
}

function mudarDia(idx) {
    diaAtualIdx = idx;
    document.querySelectorAll('.btn-dia').forEach((b, i) => b.classList.toggle('active', i === idx));
    renderizar();
}

function renderizar() {
    if (window.camada) map.removeLayer(window.camada);

    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + diaAtualIdx);
    const tInicio = new Date(dataAlvo).setHours(0,0,0,0);
    const tFim = new Date(dataAlvo).setHours(23,59,59,999);

    window.camada = L.geoJSON(geoJsonData, {
        style: function(f) {
            const nomeDistrito = f.properties.Distrito || f.properties.distrito || f.properties.name || "";
            const regCode = distritosIdMap[normalizar(nomeDistrito)];
            let maxPeso = 0;

            dadosAvisos.forEach(a => {
                const aStart = new Date(a.startTime).getTime();
                const aEnd = new Date(a.endTime).getTime();
                // Verificação dupla: pelo idAreaAviso direto (RegCode)
                if (a.idAreaAviso === regCode && aStart <= tFim && aEnd >= tInicio) {
                    if (pesos[a.awarenessLevelID] > maxPeso) maxPeso = pesos[a.awarenessLevelID];
                }
            });

            const cor = Object.keys(pesos).find(k => pesos[k] === maxPeso) || 'green';
            return { fillColor: cores[cor], fillOpacity: 0.7, color: "#000", weight: 1 };
        },
        onEachFeature: function(f, l) {
            const nomeDistrito = f.properties.Distrito || f.properties.distrito || f.properties.name || "";
            const regCode = distritosIdMap[normalizar(nomeDistrito)];
            let html = `<strong class="popup-titulo">${nomeDistrito}</strong>`;
            let avisosCount = 0;

            dadosAvisos.forEach(a => {
                const aStart = new Date(a.startTime).getTime();
                const aEnd = new Date(a.endTime).getTime();
                if (a.idAreaAviso === regCode && aStart <= tFim && aEnd >= tInicio && a.awarenessLevelID !== 'green') {
                    avisosCount++;
                    html += `<div class="aviso-item">
                        <b style="color:${cores[a.awarenessLevelID]}">${a.awarenessTypeName}</b>
                        <span class="aviso-tempo">${a.startTime.split('T')[1].substring(0,5)} - ${a.endTime.split('T')[1].substring(0,5)}</span>
                        <span class="aviso-desc">${a.text}</span>
                    </div>`;
                }
            });
            l.bindPopup(html + (avisosCount === 0 ? "✅ Sem avisos ativos" : ""));
        }
    }).addTo(map);
}

inicializar();
</script>
</body>
</html>
