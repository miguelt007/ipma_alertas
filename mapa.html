<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Alertas Meteorológicos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #111; color: white; overflow: hidden; }
        #topbar { background: #222; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #444; }
        #map { height: calc(100vh - 60px); width: 100%; background: #1a1a1a; }
        
        .nav-regioes { display: flex; gap: 15px; border-right: 1px solid #444; padding-right: 20px; }
        .nav-regioes a { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .nav-regioes a.active { color: #fff; border-bottom: 2px solid #007bff; }

        .grupo-botoes { display: flex; gap: 8px; }
        .btn-dia { padding: 8px 15px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-dia.active { background: #007bff; border-color: #0056b3; }
        
        .leaflet-popup-content-wrapper { background: #222; color: white; border: 1px solid #444; border-radius: 8px; width: 320px; }
        .popup-titulo { font-size: 16px; border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 5px; display: block; color: #fff; font-weight: bold; text-transform: uppercase; }
        .aviso-item { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #444; }
        .aviso-item:last-child { border-bottom: none; }
        .aviso-tipo { font-weight: bold; display: block; font-size: 14px; margin-bottom: 2px; text-transform: uppercase; }
        .aviso-validade { font-size: 11px; color: #ffcc00; display: block; margin-bottom: 6px; font-family: monospace; font-weight: bold; }
        .aviso-desc { font-size: 11px; color: #eee; display: block; line-height: 1.4; }
        
        .legenda { background: rgba(0, 0, 0, 0.85); padding: 12px; color: #fff; border-radius: 8px; font-size: 12px; border: 1px solid #444; }
        .legenda i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="nav-regioes">
            <a href="mapa.html" class="active">Continente</a>
            <a href="madeira.html">Madeira</a>
            <a href="acores.html">Açores</a>
        </div>
        <div style="font-size: 16px; font-weight: bold;">IPMA - ALERTAS TEMPO REAL</div>
    </div>
    <div class="grupo-botoes">
        <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
        <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
        <button class="btn-dia" onclick="mudarDia(2, this)">+2 DIAS</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const cores = { 'green': '#2ecc71', 'yellow': '#ffff00', 'orange': '#ff9900', 'red': '#ff3333' };
const pesos = { 'green': 0, 'yellow': 1, 'orange': 2, 'red': 3 };

const map = L.map('map', { zoomSnap: 0.1 }).setView([39.6, -8.1], 6.5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let dadosAvisos = [];
let geoJsonData = null;

function formatarDataIPMA(isoStr) {
    const d = new Date(isoStr);
    const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    return `${d.getDate().toString().padStart(2, '0')} ${meses[d.getMonth()]}, ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
}

async function inicializar() {
    try {
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json?t=' + Date.now());
        dadosAvisos = await resAvisos.json();
        const resGeo = await fetch('distritos.geojson');
        geoJsonData = await resGeo.json();
        renderizar(0);
    } catch (err) { console.error("Erro ao carregar dados."); }
}

function renderizar(diaIdx) {
    const agora = new Date().getTime();
    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
    
    // Janela temporal do dia selecionado
    const tInicioDia = new Date(dataAlvo).setHours(0,0,0,0);
    const tFimDia = new Date(dataAlvo).setHours(23,59,59,999);

    if (window.camada) map.removeLayer(window.camada);

    window.camada = L.geoJSON(geoJsonData, {
        style: function(f) {
            const regCode = f.properties.RegCode; 
            let maxNivel = 'green';

            dadosAvisos.forEach(a => {
                const aInicio = new Date(a.startTime).getTime();
                const aFim = new Date(a.endTime).getTime();
                
                // CRITÉRIO DE FILTRAGEM:
                // 1. Deve pertencer ao distrito (RegCode)
                // 2. O alerta deve estar dentro do dia selecionado
                // 3. Se for HOJE (diaIdx == 0), o alerta ainda não deve ter terminado (aFim > agora)
                if (a.idAreaAviso === regCode && aInicio <= tFimDia && aFim >= tInicioDia) {
                    if (diaIdx === 0 && aFim <= agora) return; // Ignora se já terminou hoje

                    if (pesos[a.awarenessLevelID] > pesos[maxNivel]) {
                        maxNivel = a.awarenessLevelID;
                    }
                }
            });

            return { fillColor: cores[maxNivel], fillOpacity: 0.7, color: "#000", weight: 1.2 };
        },
        onEachFeature: function(f, l) {
            const regCode = f.properties.RegCode;
            const nomeDistrito = f.properties.Name;
            let html = `<strong class="popup-titulo">${nomeDistrito}</strong>`;
            
            const avisosAtivos = dadosAvisos.filter(a => {
                const aInicio = new Date(a.startTime).getTime();
                const aFim = new Date(a.endTime).getTime();
                const condicaoDia = (a.idAreaAviso === regCode && aInicio <= tFimDia && aFim >= tInicioDia);
                if (diaIdx === 0) return condicaoDia && aFim > agora; // Só mostra o que não terminou
                return condicaoDia;
            }).sort((a, b) => pesos[b.awarenessLevelID] - pesos[a.awarenessLevelID]);

            if (avisosAtivos.length > 0) {
                avisosAtivos.forEach(a => {
                    html += `
                    <div class="aviso-item">
                        <span class="aviso-tipo" style="color:${cores[a.awarenessLevelID]}">${a.awarenessTypeName}</span>
                        <span class="aviso-validade">⏱ ${formatarDataIPMA(a.startTime)} até ${formatarDataIPMA(a.endTime)}</span>
                        <span class="aviso-desc">${a.text}</span>
                    </div>`;
                });
            } else {
                html += "✅ Sem avisos ativos para o período selecionado.";
            }

            l.bindPopup(html);
        }
    }).addTo(map);
}

function mudarDia(dia, btn) {
    document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderizar(dia);
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = '<b>Avisos IPMA</b><br><i style="background:#ff3333"></i>Vermelho<br><i style="background:#ff9900"></i>Laranja<br><i style="background:#ffff00"></i>Amarelo<br><i style="background:#2ecc71"></i>Sem Aviso';
    return div;
};
legenda.addTo(map);

inicializar();
</script>
</body>
</html>
