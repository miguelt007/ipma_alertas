<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alertas Meteorológicos IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: Arial; margin: 0; background: #111; color: white; }
        #topbar { background: #222; padding: 12px; text-align: center; border-bottom: 1px solid #444; }
        #titulo { font-size: 22px; font-weight: bold; }
        #data { font-size: 14px; color: #bbb; margin-top: 4px; }
        #map { height: 85vh; width: 100%; }
        .legenda { background: white; padding: 10px; line-height: 18px; color: #333; box-shadow: 0 0 6px rgba(0,0,0,0.4); border-radius: 4px; }
        
        /* Cores dos Avisos */
        .aviso-vermelho { color: #ff3333; font-weight: bold; }
        .aviso-laranja { color: #ff9900; font-weight: bold; }
        .aviso-amarelo { color: #ffff00; font-weight: bold; }
        .aviso-verde { color: #00cc00; }
    </style>
</head>
<body>

<div id="topbar">
    <div id="titulo">Alertas Meteorológicos IPMA</div>
    <div id="data">A carregar avisos...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([39.5, -8.0], 7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© IPMA | OpenStreetMap'
}).addTo(map);

let camadaDistritos;
let avisosPorDistrito = {};

// Mapeamento de cores IPMA
function corAviso(nivel) {
    const cores = {
        'red': '#ff3333',
        'orange': '#ff9900',
        'yellow': '#ffff00',
        'green': '#00cc00'
    };
    return cores[nivel] || "#00cc00";
}

function traduzirNivel(nivel) {
    const nomes = { 'red': 'Vermelho', 'orange': 'Laranja', 'yellow': 'Amarelo', 'green': 'Sem Aviso' };
    return nomes[nivel] || "Sem dados";
}

async function carregarAvisos() {
    try {
        // 1. Ir buscar os avisos à API
        const resp = await fetch('https://api.ipma.pt/open-data/warnings_www.json');
        const dados = await resp.json();
        
        document.getElementById("data").innerHTML = "Atualizado: " + new Date().toLocaleString('pt-PT');

        // Limpar dados anteriores
        avisosPorDistrito = {};

        // 2. Processar avisos (Pegar sempre o nível mais grave por distrito)
        dados.forEach(aviso => {
            const idArea = aviso.idAreaAviso; // Ex: "LRA", "LIS", "PTO"
            const nivel = aviso.awarenessLevelID;
            
            // Lógica: se já houver um aviso e for menos grave que o atual, ignora
            if (!avisosPorDistrito[idArea] || pesoNivel(nivel) > pesoNivel(avisosPorDistrito[idArea].nivel)) {
                avisosPorDistrito[idArea] = {
                    nivel: nivel,
                    info: aviso.awarenessTypeName,
                    descricao: aviso.description
                };
            }
        });

        // 3. Carregar o GeoJSON dos Distritos (ou usar o seu existente)
        // Nota: Certifique-se que o seu GeoJSON tem uma propriedade que bata com o ID do IPMA (ex: "LIS" para Lisboa)
        if (!camadaDistritos) {
            const geo = await fetch("distritos-portugal.geojson"); 
            const distritos = await geo.json();

            camadaDistritos = L.geoJSON(distritos, {
                style: function(feature) {
                    const id = feature.properties.ID_IPMA; // Ajuste conforme o seu GeoJSON
                    const aviso = avisosPorDistrito[id] || { nivel: 'green' };
                    return {
                        color: "#555",
                        weight: 1,
                        fillColor: corAviso(aviso.nivel),
                        fillOpacity: 0.6
                    };
                },
                onEachFeature: function(feature, layer) {
                    const id = feature.properties.ID_IPMA;
                    const aviso = avisosPorDistrito[id] || { nivel: 'green', info: 'Sem avisos ativos' };
                    
                    layer.bindPopup(`
                        <div style='color:#333'>
                            <b>${feature.properties.NAME_1}</b><br>
                            Estado: <span style="color:${corAviso(aviso.nivel)}">${traduzirNivel(aviso.nivel)}</span><br>
                            <i>${aviso.info}</i>
                        </div>
                    `);
                    
                    layer.on('mouseover', (e) => e.target.setStyle({ fillOpacity: 0.9 }));
                    layer.on('mouseout', (e) => e.target.setStyle({ fillOpacity: 0.6 }));
                }
            }).addTo(map);
        }
    } catch (e) {
        document.getElementById("data").innerHTML = "Erro ao carregar API do IPMA";
        console.error(e);
    }
}

function pesoNivel(n) {
    return { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 }[n] || 0;
}

carregarAvisos();

// Legenda
const legenda = L.control({position: 'bottomright'});
legenda.onAdd = function() {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = `
        <b>Avisos IPMA</b><br>
        <i style="background:#ff3333;width:12px;height:12px;display:inline-block"></i> Vermelho<br>
        <i style="background:#ff9900;width:12px;height:12px;display:inline-block"></i> Laranja<br>
        <i style="background:#ffff00;width:12px;height:12px;display:inline-block"></i> Amarelo<br>
        <i style="background:#00cc00;width:12px;height:12px;display:inline-block"></i> Sem Aviso
    `;
    return div;
};
legenda.addTo(map);

</script>
</body>
</html>
