<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa de Alertas IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #111; color: white; }
        #topbar { background: #222; padding: 15px; text-align: center; border-bottom: 1px solid #444; }
        #map { height: 85vh; width: 100%; }
        .legenda { background: white; padding: 10px; color: #333; border-radius: 5px; font-size: 12px; }
        .legenda i { width: 15px; height: 15px; float: left; margin-right: 8px; border: 1px solid #999; }
    </style>
</head>
<body>

<div id="topbar">
    <div id="titulo" style="font-size:20px; font-weight:bold;">Alertas Meteorológicos IPMA</div>
    <select id="selecaoDia" style="margin-top:10px; padding:5px; background:#333; color:white;">
        <option value="0">Hoje</option>
        <option value="1">Amanhã</option>
        <option value="2">Depois de Amanhã</option>
    </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// O teu objeto de mapeamento (copiado do teu código)
const areaInfo = {
    "AVR": { name: "Aveiro", region: "Continente" }, "BJA": { name: "Beja", region: "Continente" }, 
    "BRG": { name: "Braga", region: "Continente" }, "BGC": { name: "Bragança", region: "Continente" },
    "CBO": { name: "Castelo Branco", region: "Continente" }, "CBR": { name: "Coimbra", region: "Continente" },
    "EVR": { name: "Évora", region: "Continente" }, "FAR": { name: "Faro", region: "Continente" },
    "GDA": { name: "Guarda", region: "Continente" }, "LRA": { name: "Leiria", region: "Continente" },
    "LSB": { name: "Lisboa", region: "Continente" }, "PTG": { name: "Portalegre", region: "Continente" },
    "PTO": { name: "Porto", region: "Continente" }, "STM": { name: "Santarém", region: "Continente" },
    "STB": { name: "Setúbal", region: "Continente" }, "VCT": { name: "Viana do Castelo", region: "Continente" },
    "VRL": { name: "Vila Real", region: "Continente" }, "VIS": { name: "Viseu", region: "Continente" }
};

const map = L.map('map').setView([39.5, -8.0], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

let dadosAvisos = [];

async function inicializar() {
    try {
        // Usando exatamente o URL da tua tabela que funciona!
        const API_URL = 'https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json';
        const resAvisos = await fetch(API_URL);
        dadosAvisos = await resAvisos.json();

        // Carregar o teu GeoJSON local
        const resGeo = await fetch('distritos.geojson');
        const geoJsonData = await resGeo.json();

        function renderizar(diaIdx) {
            const dataAlvo = new Date();
            dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
            const dataStr = dataAlvo.toISOString().split('T')[0];

            if (window.camada) map.removeLayer(window.camada);

            window.camada = L.geoJSON(geoJsonData, {
                style: function(f) {
                    // Pegamos no nome do distrito do teu ficheiro e procuramos no areaInfo
                    const nomeNoMapa = (f.properties.Distrito || f.properties.distrito || "").trim();
                    const nivel = obterMaxAviso(nomeNoMapa, dataStr);
                    return { fillColor: cores[nivel], fillOpacity: 0.7, color: "#444", weight: 1 };
                },
                onEachFeature: function(f, l) {
                    const nome = (f.properties.Distrito || f.properties.distrito || "").trim();
                    const nivel = obterMaxAviso(nome, dataStr);
                    l.bindPopup(`<b>${nome}</b><br>Aviso: ${nivel.toUpperCase()}`);
                }
            }).addTo(map);
        }

        renderizar(0);
        document.getElementById('selecaoDia').onchange = (e) => renderizar(e.target.value);

    } catch (err) {
        console.error("Erro:", err);
        alert("Erro ao carregar dados. Verifica o ficheiro distritos.geojson.");
    }
}

function obterMaxAviso(nomeDistrito, dataStr) {
    let max = 'green';
    dadosAvisos.forEach(aviso => {
        // Cruzamos o idAreaAviso do IPMA com o nosso objeto areaInfo
        const info = areaInfo[aviso.idAreaAviso];
        if (info && info.name.toUpperCase() === nomeDistrito.toUpperCase() && aviso.startTime.startsWith(dataStr)) {
            if (pesos[aviso.awarenessLevelID] > pesos[max]) max = aviso.awarenessLevelID;
        }
    });
    return max;
}

inicializar();
</script>
</body>
</html>
