<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa de Alertas IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #111; color: white; overflow: hidden; }
        #topbar { 
            background: #222; 
            padding: 10px; 
            text-align: center; 
            border-bottom: 1px solid #444; 
            display: flex; 
            justify-content: center; 
            gap: 10px;
        }
        #map { height: calc(100vh - 60px); width: 100%; }
        
        /* Estilo dos Botões de Dias */
        .btn-dia {
            padding: 8px 15px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-dia:hover { background: #555; }
        .btn-dia.active { background: #007bff; border-color: #0056b3; }

        /* Estilo da Legenda */
        .legenda { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 10px; 
            color: #333; 
            border-radius: 5px; 
            font-size: 12px; 
            line-height: 18px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .legenda i { 
            width: 15px; 
            height: 15px; 
            float: left; 
            margin-right: 8px; 
            border: 1px solid #999; 
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div id="topbar">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
    <button class="btn-dia" onclick="mudarDia(2, this)">+2 DIAS</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const areaInfo = {
    "AVR": { name: "Aveiro" }, "BJA": { name: "Beja" }, 
    "BRG": { name: "Braga" }, "BGC": { name: "Bragança" },
    "CBO": { name: "Castelo Branco" }, "CBR": { name: "Coimbra" },
    "EVR": { name: "Évora" }, "FAR": { name: "Faro" },
    "GDA": { name: "Guarda" }, "LRA": { name: "Leiria" },
    "LSB": { name: "Lisboa" }, "PTG": { name: "Portalegre" },
    "PTO": { name: "Porto" }, "STM": { name: "Santarém" },
    "STB": { name: "Setúbal" }, "VCT": { name: "Viana do Castelo" },
    "VRL": { name: "Vila Real" }, "VIS": { name: "Viseu" }
};

// Ajuste automático de zoom conforme o ecrã
const zoomInicial = window.innerWidth < 600 ? 5.5 : 6;
const map = L.map('map', { zoomSnap: 0.5 }).setView([39.5, -8.0], zoomInicial);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

let dadosAvisos = [];
let geoJsonData = null;

async function inicializar() {
    try {
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
        dadosAvisos = await resAvisos.json();

        const resGeo = await fetch('distritos.geojson');
        geoJsonData = await resGeo.json();

        renderizar(0);
    } catch (err) {
        console.error("Erro:", err);
    }
}

function renderizar(diaIdx) {
    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
    const dataStr = dataAlvo.toISOString().split('T')[0];

    if (window.camada) map.removeLayer(window.camada);

    window.camada = L.geoJSON(geoJsonData, {
        style: function(f) {
            const nomeNoMapa = (f.properties.Distrito || f.properties.distrito || "").trim();
            const nivel = obterMaxAviso(nomeNoMapa, dataStr);
            return { fillColor: cores[nivel], fillOpacity: 0.7, color: "#444", weight: 1 };
        },
        onEachFeature: function(f, l) {
            const nome = (f.properties.Distrito || f.properties.distrito || "").trim();
            const nivel = obterMaxAviso(nome, dataStr);
            l.bindPopup(`<b>${nome}</b><br>Aviso: ${nivel.toUpperCase()}`);
        }
    }).addTo(map);
}

function obterMaxAviso(nomeDistrito, dataStr) {
    let max = 'green';
    dadosAvisos.forEach(aviso => {
        const info = areaInfo[aviso.idAreaAviso];
        if (info && info.name.toUpperCase() === nomeDistrito.toUpperCase() && aviso.startTime.startsWith(dataStr)) {
            if (pesos[aviso.awarenessLevelID] > pesos[max]) max = aviso.awarenessLevelID;
        }
    });
    return max;
}

function mudarDia(dia, elemento) {
    // Atualizar estilo dos botões
    document.querySelectorAll('.btn-dia').forEach(btn => btn.classList.remove('active'));
    elemento.classList.add('active');
    // Renderizar dados do dia escolhido
    renderizar(dia);
}

// Adicionar Legenda ao Mapa
const legendaControl = L.control({position: 'bottomright'});
legendaControl.onAdd = function (map) {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = '<b>Avisos IPMA</b><br>' +
        '<i style="background:#ff3333"></i> Vermelho (Extremo)<br>' +
        '<i style="background:#ff9900"></i> Laranja (Moderado)<br>' +
        '<i style="background:#ffff00"></i> Amarelo (Beira)<br>' +
        '<i style="background:#2ecc71"></i> Sem Aviso';
    return div;
};
legendaControl.addTo(map);

inicializar();
</script>
</body>
</html>
