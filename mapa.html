<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa de Alertas Meteorológicos IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #111; color: white; }
        #topbar { background: #222; padding: 15px; text-align: center; border-bottom: 1px solid #444; }
        #titulo { font-size: 22px; font-weight: bold; }
        #data { font-size: 14px; color: #bbb; margin-top: 5px; }
        #filtro { margin-top: 10px; }
        select { padding: 6px; font-size: 16px; background: #333; color: white; border: 1px solid #555; }
        #map { height: 80vh; width: 100%; }
        
        .legenda {
            background: white;
            padding: 10px;
            line-height: 18px;
            color: #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border-radius: 5px;
        }
        .legenda i { width: 16px; height: 16px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="topbar">
    <div id="titulo">Alertas Meteorológicos IPMA</div>
    <div id="data">A carregar dados...</div>
    
    <div id="filtro">
        Previsão para: 
        <select id="selecaoDia">
            <option value="0">Hoje</option>
            <option value="1">Amanhã</option>
            <option value="2">Depois de Amanhã</option>
        </select>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([39.5, -8.0], 7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© IPMA | OpenStreetMap'
}).addTo(map);

let camadaGeo;
let todosAvisos = [];
let dicionarioNomes = {};
const cores = { 'red': '#ff3333', 'orange': '#ff9900', 'yellow': '#ffff00', 'green': '#2ecc71' };
const pesos = { 'red': 3, 'orange': 2, 'yellow': 1, 'green': 0 };

async function carregarDados() {
    try {
        // 1. Carregar Nomes (o JSON que forneceste)
        const resNomes = await fetch('https://api.ipma.pt/open-data/distrits-islands.json');
        const dataNomes = await resNomes.json();
        dataNomes.data.forEach(item => {
            dicionarioNomes[item.idAreaAviso] = item.local;
        });

        // 2. Carregar Avisos
        const resAvisos = await fetch('https://api.ipma.pt/open-data/warnings_www.json');
        todosAvisos = await resAvisos.json();
        
        // 3. Carregar GeoJSON (distritos.geojson deve estar na mesma pasta)
        const resGeo = await fetch("distritos.geojson");
        const geoData = await resGeo.json();

        atualizarMapa(0, geoData); // Inicia com "Hoje" (dia 0)

        // Evento para mudar o dia
        document.getElementById('selecaoDia').addEventListener('change', (e) => {
            atualizarMapa(parseInt(e.target.value), geoData);
        });

    } catch (err) {
        document.getElementById("data").innerHTML = "Erro ao carregar ficheiros.";
        console.error(err);
    }
}

function atualizarMapa(diaOffset, geoData) {
    if (camadaGeo) map.removeLayer(camadaGeo);

    // Calcular a data alvo
    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + diaOffset);
    const dataString = dataAlvo.toISOString().split('T')[0];

    document.getElementById("data").innerHTML = "Avisos para: " + dataAlvo.toLocaleDateString('pt-PT');

    camadaGeo = L.geoJSON(geoData, {
        style: function(feature) {
            const nomeDistrito = feature.properties.distrito || feature.properties.name || feature.properties.NOME_1;
            const nivel = obterNivelMaximo(nomeDistrito, dataString);
            return {
                fillColor: cores[nivel] || cores['green'],
                fillOpacity: 0.7,
                color: "#444",
                weight: 1
            };
        },
        onEachFeature: function(feature, layer) {
            const nome = feature.properties.distrito || feature.properties.name || feature.properties.NOME_1;
            const nivel = obterNivelMaximo(nome, dataString);
            
            let txt = `<b>${nome}</b><br>Estado: ${traduzir(nivel)}`;
            
            // Mostrar detalhes do aviso se existir
            const aviso = todosAvisos.find(a => dicionarioNomes[a.idAreaAviso] === nome && a.startTime.startsWith(dataString));
            if (aviso && nivel !== 'green') {
                txt += `<br><small>Tipo: ${aviso.awarenessTypeName}</small>`;
            }

            layer.bindPopup(txt);
            layer.on('mouseover', (e) => e.target.setStyle({ fillOpacity: 0.9 }));
            layer.on('mouseout', (e) => e.target.setStyle({ fillOpacity: 0.7 }));
        }
    }).addTo(map);
}

function obterNivelMaximo(nome, dataStr) {
    let max = 'green';
    todosAvisos.forEach(aviso => {
        if (dicionarioNomes[aviso.idAreaAviso] === nome && aviso.startTime.startsWith(dataStr)) {
            if (pesos[aviso.awarenessLevelID] > pesos[max]) {
                max = aviso.awarenessLevelID;
            }
        }
    });
    return max;
}

function traduzir(n) {
    const t = { 'red': 'Vermelho', 'orange': 'Laranja', 'yellow': 'Amarelo' };
    return t[n] || 'Sem Avisos';
}

// Legenda
const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = `<b>Avisos IPMA</b><br>
        <i style="background:${cores.red}"></i> Vermelho<br>
        <i style="background:${cores.orange}"></i> Laranja<br>
        <i style="background:${cores.yellow}"></i> Amarelo<br>
        <i style="background:${cores.green}"></i> Sem Aviso`;
    return div;
};
legenda.addTo(map);

carregarDados();
</script>
</body>
</html>
