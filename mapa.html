<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa Alertas IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #111; color: white; overflow: hidden; }
        #topbar { 
            background: #222; padding: 12px 20px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 2px solid #444; 
        }
        #map { height: calc(100vh - 60px); width: 100%; background: #1a1a1a; }
        
        .grupo-botoes { display: flex; gap: 8px; }
        .btn-dia { 
            padding: 8px 15px; background: #333; color: white; border: 1px solid #555; 
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; 
        }
        .btn-dia.active { background: #007bff; border-color: #0056b3; }

        /* Estilo do Popup */
        .leaflet-popup-content-wrapper { background: #222; color: white; border: 1px solid #444; }
        .leaflet-popup-tip { background: #222; }
        .popup-titulo { font-size: 16px; border-bottom: 1px solid #444; margin-bottom: 8px; padding-bottom: 4px; display: block; }
        .aviso-linha { margin-bottom: 4px; font-size: 13px; display: flex; align-items: center; gap: 8px; }

        .legenda { 
            background: rgba(255, 255, 255, 0.95); padding: 10px; color: #333; 
            border-radius: 8px; font-size: 12px; line-height: 18px; 
        }
        .legenda i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="font-size: 18px; font-weight: bold; letter-spacing: 1px;">ALERTAS METEO</div>
    <div class="grupo-botoes">
        <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
        <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
        <button class="btn-dia" onclick="mudarDia(2, this)">+2 DIAS</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const areaInfo = {
    "AVR": "Aveiro", "BJA": "Beja", "BRG": "Braga", "BGC": "Bragança", "CBO": "Castelo Branco", "CBR": "Coimbra", 
    "EVR": "Évora", "FAR": "Faro", "GDA": "Guarda", "LRA": "Leiria", "LSB": "Lisboa", "PTG": "Portalegre",
    "PTO": "Porto", "STM": "Santarém", "STB": "Setúbal", "VCT": "Viana do Castelo", "VRL": "Vila Real", "VIS": "Viseu"
};

const traducaoNivel = { 'green': 'Sem Aviso', 'yellow': 'Amarelo', 'orange': 'Laranja', 'red': 'Vermelho' };
const cores = { 'green': '#2ecc71', 'yellow': '#ffff00', 'orange': '#ff9900', 'red': '#ff3333' };
const pesos = { 'green': 0, 'yellow': 1, 'orange': 2, 'red': 3 };

// Mapeamento de Ícones por tipo de aviso
const iconesAviso = {
    "Precipitação": "🌧️",
    "Vento": "🌬️",
    "Agitação Marítima": "🌊",
    "Neve": "❄️",
    "Trovoada": "⚡",
    "Nevoeiro": "🌫️",
    "Ondas de Calor": "🔥",
    "Frio": "🥶"
};

const map = L.map('map', { zoomSnap: 0.1 }).setView([39.6, -8.1], 6.2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let dadosAvisos = [];
let geoJsonData = null;

function normalizar(t) { return t ? t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : ""; }

async function inicializar() {
    try {
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
        dadosAvisos = await resAvisos.json();
        const resGeo = await fetch('distritos.geojson');
        geoJsonData = await resGeo.json();
        renderizar(0);
    } catch (err) { console.error("Erro ao carregar dados."); }
}

function renderizar(diaIdx) {
    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + parseInt(diaIdx));
    const inicio = new Date(dataAlvo).setHours(0,0,0,0);
    const fim = new Date(dataAlvo).setHours(23,59,59,999);

    if (window.camada) map.removeLayer(window.camada);

    window.camada = L.geoJSON(geoJsonData, {
        style: function(f) {
            const nivel = obterInfo(f.properties.Distrito || f.properties.distrito || f.properties.name, inicio, fim).max;
            return { fillColor: cores[nivel], fillOpacity: 0.7, color: "#222", weight: 1.5 };
        },
        onEachFeature: function(f, l) {
            const nome = f.properties.Distrito || f.properties.distrito || f.properties.name || "";
            const info = obterInfo(nome, inicio, fim);
            
            let htmlPopup = `<strong class="popup-titulo">${nome}</strong>`;
            
            if (info.detalhes.length > 0) {
                info.detalhes.forEach(d => {
                    const icone = iconesAviso[d.tipo] || "⚠️";
                    htmlPopup += `<div class="aviso-linha">
                        <span>${icone}</span> 
                        <span style="color:${cores[d.nivel]}; font-weight:bold;">${d.tipo}: ${traducaoNivel[d.nivel]}</span>
                    </div>`;
                });
            } else {
                htmlPopup += `<div class="aviso-linha">✅ Sem avisos ativos</div>`;
            }
            
            l.bindPopup(htmlPopup);
        }
    }).addTo(map);
}

function obterInfo(nomeDistrito, inicio, fim) {
    let max = 'green';
    let detalhes = [];
    const nomeM = normalizar(nomeDistrito);

    dadosAvisos.forEach(a => {
        const nomeO = normalizar(areaInfo[a.idAreaAviso]);
        if (nomeO === nomeM) {
            const aInicio = new Date(a.startTime).getTime();
            const aFim = new Date(a.endTime).getTime();
            if (aInicio <= fim && aFim >= inicio) {
                if (pesos[a.awarenessLevelID] > pesos[max]) max = a.awarenessLevelID;
                detalhes.push({
                    tipo: a.awarenessTypeName,
                    nivel: a.awarenessLevelID
                });
            }
        }
    });
    return { max, detalhes };
}

function mudarDia(dia, btn) {
    document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderizar(dia);
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = '<b>Legenda</b><br><i style="background:#ff3333"></i>Vermelho<br><i style="background:#ff9900"></i>Laranja<br><i style="background:#ffff00"></i>Amarelo<br><i style="background:#2ecc71"></i>Sem Aviso';
    return div;
};
legenda.addTo(map);

inicializar();
</script>
</body>
</html>
