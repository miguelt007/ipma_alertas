<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Madeira Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #111; color: white; overflow: hidden; }
        #topbar { background: #222; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #444; }
        #map { height: calc(100vh - 60px); width: 100%; background: #1a1a1a; }
        .nav-regioes { display: flex; gap: 15px; margin-right: 20px; border-right: 1px solid #444; padding-right: 20px; }
        .nav-regioes a { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .nav-regioes a.active { color: #fff; border-bottom: 2px solid #007bff; }
        .grupo-botoes { display: flex; gap: 8px; }
        .btn-dia { padding: 8px 15px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-dia.active { background: #007bff; border-color: #0056b3; }
        .leaflet-popup-content-wrapper { background: #222; color: white; border-radius: 8px; width: 320px; }
        .popup-titulo { font-size: 16px; border-bottom: 1px solid #444; margin-bottom: 10px; display: block; font-weight: bold; }
        .aviso-item { margin-bottom: 12px; border-bottom: 1px dashed #444; padding-bottom: 8px; }
        .aviso-topo { display: flex; align-items: center; gap: 10px; }
        .aviso-img { width: 24px; height: 24px; }
        .aviso-tempo { font-size: 11px; color: #ffa500; display: block; margin-left: 34px; font-weight: bold; }
        .aviso-desc { font-size: 12px; color: #eee; display: block; margin-top: 5px; margin-left: 34px; }
        .legenda { background: rgba(255, 255, 255, 0.9); padding: 10px; color: #333; border-radius: 8px; font-size: 12px; }
        .legenda i { width: 14px; height: 14px; float: left; margin-right: 8px; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="display: flex; align-items: center;">
        <div class="nav-regioes">
            <a href="mapa.html">Continente</a>
            <a href="madeira.html" class="active">Madeira</a>
            <a href="acores.html">Açores</a>
        </div>
        <div style="font-size: 16px; font-weight: bold;">IPMA - MADEIRA</div>
    </div>
    <div class="grupo-botoes">
        <button id="btn0" class="btn-dia active" onclick="mudarDia(0)">HOJE</button>
        <button id="btn1" class="btn-dia" onclick="mudarDia(1)">AMANHÃ</button>
        <button id="btn2" class="btn-dia" onclick="mudarDia(2)">+2 DIAS</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const cores = { 'green': '#2ecc71', 'yellow': '#ffff00', 'orange': '#ff9900', 'red': '#ff3333' };
const pesos = { 'green': 0, 'yellow': 1, 'orange': 2, 'red': 3 };

const map = L.map('map').setView([32.75, -16.96], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let dadosAvisos = [];
let geoJsonData = null;
let diaAtualIdx = 0;

async function inicializar() {
    try {
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json?nocache=' + Date.now());
        dadosAvisos = await resAvisos.json();
        const resGeo = await fetch('madeira.geojson');
        geoJsonData = await resGeo.json();
        renderizar();
    } catch (err) { console.error("Erro ao carregar dados."); }
}

function mudarDia(idx) {
    diaAtualIdx = idx;
    document.querySelectorAll('.btn-dia').forEach((b, i) => b.classList.toggle('active', i === idx));
    renderizar();
}

function renderizar() {
    if (window.camada) map.removeLayer(window.camada);

    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + diaAtualIdx);
    const tInicio = new Date(dataAlvo).setHours(0,0,0,0);
    const tFim = new Date(dataAlvo).setHours(23,59,59,999);

    window.camada = L.geoJSON(geoJsonData, {
        style: function(f) {
            const n = (f.properties.Name || f.properties.name || "").toUpperCase();
            const cor = obterCorDia(n, tInicio, tFim);
            return { fillColor: cor, fillOpacity: 0.8, color: "#000", weight: 1.5 };
        },
        onEachFeature: function(f, l) {
            const n = f.properties.Name || f.properties.name || "";
            l.bindPopup(gerarPopup(n, tInicio, tFim));
        }
    }).addTo(map);
}

function obterCorDia(nome, tInicio, tFim) {
    let maxPeso = 0;
    let corFinal = cores.green;
    const isPortoSanto = nome.includes("PORTO SANTO");

    dadosAvisos.forEach(a => {
        const aStart = new Date(a.startTime).getTime();
        const aEnd = new Date(a.endTime).getTime();
        
        // SÓ ENTRA SE O AVISO ESTIVER ATIVO NAS 24H DESTE DIA
        if (aStart <= tFim && aEnd >= tInicio) {
            const area = a.idAreaAviso;
            if ((isPortoSanto && area === 'MPS') || (!isPortoSanto && area === 'MAM')) {
                if (pesos[a.awarenessLevelID] > maxPeso) {
                    maxPeso = pesos[a.awarenessLevelID];
                    corFinal = cores[a.awarenessLevelID];
                }
            }
        }
    });
    return corFinal;
}

function gerarPopup(nome, tInicio, tFim) {
    let html = `<strong class="popup-titulo">${nome}</strong>`;
    let encontrou = false;
    const isPortoSanto = nome.toUpperCase().includes("PORTO SANTO");

    dadosAvisos.forEach(a => {
        const aStart = new Date(a.startTime).getTime();
        const aEnd = new Date(a.endTime).getTime();

        if (aStart <= tFim && aEnd >= tInicio) {
            const area = a.idAreaAviso;
            if ((isPortoSanto && area === 'MPS') || (!isPortoSanto && area === 'MAM')) {
                if (a.awarenessLevelID !== 'green') {
                    encontrou = true;
                    // FORMATAÇÃO DA DATA PARA O DIA ESPECÍFICO
                    const dIn = new Date(Math.max(aStart, tInicio));
                    const dOut = new Date(Math.min(aEnd, tFim));
                    
                    html += `
                    <div class="aviso-item">
                        <div class="aviso-topo">
                            <img src="icons/${a.awarenessTypeName}.svg" onerror="this.src='icons/Alerta.svg'" class="aviso-img">
                            <span style="color:${cores[a.awarenessLevelID]}; font-weight:bold;">${a.awarenessTypeName}</span>
                        </div>
                        <span class="aviso-tempo">Válido para este dia: ${dIn.getHours()}:00h até ${dOut.getHours()}:00h</span>
                        <span class="aviso-desc">${a.text}</span>
                    </div>`;
                }
            }
        }
    });
    return encontrou ? html : html + "<div>✅ Sem avisos ativos para este dia.</div>";
}

inicializar();
</script>
</body>
</html>
