<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Madeira Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #111; color: white; overflow: hidden; }
        #topbar { background: #222; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #444; }
        #map { height: calc(100vh - 60px); width: 100%; background: #1a1a1a; }
        .nav-regioes { display: flex; gap: 15px; border-right: 1px solid #444; padding-right: 20px; }
        .nav-regioes a { color: #888; text-decoration: none; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .nav-regioes a.active { color: #fff; border-bottom: 2px solid #007bff; }
        .grupo-botoes { display: flex; gap: 8px; }
        .btn-dia { padding: 8px 15px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-dia.active { background: #007bff; border-color: #0056b3; }
        .leaflet-popup-content-wrapper { background: #222; color: white; border-radius: 8px; width: 330px; border: 1px solid #444; }
        .popup-titulo { font-size: 15px; border-bottom: 1px solid #444; margin-bottom: 8px; display: block; color: #007bff; font-weight: bold; }
        .aviso-item { margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 8px; }
        .aviso-topo { display: flex; align-items: center; gap: 8px; }
        .aviso-img { width: 22px; height: 22px; }
        .aviso-tempo { font-size: 11px; color: #ffcc00; display: block; margin: 4px 0 0 30px; font-family: monospace; font-weight: bold; }
        .aviso-desc { font-size: 11px; color: #ccc; display: block; margin-left: 30px; line-height: 1.4; margin-top: 4px; }
    </style>
</head>
<body>

<div id="topbar">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="nav-regioes">
            <a href="mapa.html">Continente</a>
            <a href="madeira.html" class="active">Madeira</a>
            <a href="acores.html">Açores</a>
        </div>
        <span style="font-weight: bold; letter-spacing: 1px;">AVISOS MADEIRA</span>
    </div>
    <div class="grupo-botoes">
        <button id="btn0" class="btn-dia active" onclick="mudarDia(0)">HOJE</button>
        <button id="btn1" class="btn-dia" onclick="mudarDia(1)">AMANHÃ</button>
        <button id="btn2" class="btn-dia" onclick="mudarDia(2)">+2 DIAS</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const cores = { 'green': '#2ecc71', 'yellow': '#ffff00', 'orange': '#ff9900', 'red': '#ff3333' };
const pesos = { 'green': 0, 'yellow': 1, 'orange': 2, 'red': 3 };

const map = L.map('map').setView([32.75, -16.96], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let dadosAvisos = [];
let geoJsonData = null;
let diaAtualIdx = 0;

function normalizar(t) { return t ? t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase() : ""; }

function formatarData(dataMs) {
    const d = new Date(dataMs);
    const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    return `${d.getDate().toString().padStart(2, '0')} ${meses[d.getMonth()]} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
}

async function inicializar() {
    try {
        const resAvisos = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json?t=' + Date.now());
        dadosAvisos = await resAvisos.json();
        const resGeo = await fetch('madeira.geojson');
        geoJsonData = await resGeo.json();
        renderizar();
    } catch (err) { console.error("Erro ao carregar dados."); }
}

function mudarDia(idx) {
    diaAtualIdx = idx;
    document.querySelectorAll('.btn-dia').forEach((b, i) => b.classList.toggle('active', i === idx));
    renderizar();
}

function renderizar() {
    if (window.camada) map.removeLayer(window.camada);

    const dataAlvo = new Date();
    dataAlvo.setDate(dataAlvo.getDate() + diaAtualIdx);
    const tInicioDia = new Date(dataAlvo).setHours(0,0,0,0);
    const tFimDia = new Date(dataAlvo).setHours(23,59,59,999);

    window.camada = L.geoJSON(geoJsonData, {
        style: function(f) {
            const nomeGeo = f.properties.Name || "";
            const cor = obterCorPorRegiao(nomeGeo, tInicioDia, tFimDia);
            return { fillColor: cor, fillOpacity: 0.7, color: "#000", weight: 1.5 };
        },
        onEachFeature: function(f, l) {
            l.bindPopup(gerarPopup(f.properties.Name, tInicioDia, tFimDia));
        }
    }).addTo(map);
}

function obterCorPorRegiao(nomeMapa, tInicio, tFim) {
    let maxPeso = 0;
    const nM = normalizar(nomeMapa);

    dadosAvisos.forEach(a => {
        const aStart = new Date(a.startTime).getTime();
        const aEnd = new Date(a.endTime).getTime();

        if (aStart <= tFim && aEnd >= tInicio) {
            const areaIPMA = a.idAreaAviso;
            let pertence = false;

            // MAPEAMENTO REAL DE IDS DO IPMA PARA AS TUAS ZONAS
            if (nM.includes("PORTO SANTO") && areaIPMA === "MPS") pertence = true;
            if (nM.includes("COSTA NORTE") && areaIPMA === "MCN") pertence = true;
            if (nM.includes("COSTA SUL") && areaIPMA === "MCS") pertence = true;
            if (nM.includes("MONTANHOSAS") && areaIPMA === "MAM") pertence = true;

            // Backup: Se for um aviso geral "Madeira" (MAM) e for terra, pinta as 3 zonas
            if (areaIPMA === "MAM" && !nM.includes("PORTO SANTO")) pertence = true;

            if (pertence && pesos[a.awarenessLevelID] > maxPeso) {
                maxPeso = pesos[a.awarenessLevelID];
            }
        }
    });
    return maxPeso > 0 ? cores[Object.keys(pesos).find(k => pesos[k] === maxPeso)] : cores.green;
}

function gerarPopup(nomeMapa, tInicio, tFim) {
    let html = `<strong class="popup-titulo">${nomeMapa}</strong>`;
    let avisosHtml = "";
    const nM = normalizar(nomeMapa);

    dadosAvisos.forEach(a => {
        const aStart = new Date(a.startTime).getTime();
        const aEnd = new Date(a.endTime).getTime();

        if (aStart <= tFim && aEnd >= tInicio) {
            const areaIPMA = a.idAreaAviso;
            let pertence = false;

            if (nM.includes("PORTO SANTO") && areaIPMA === "MPS") pertence = true;
            if (nM.includes("COSTA NORTE") && areaIPMA === "MCN") pertence = true;
            if (nM.includes("COSTA SUL") && areaIPMA === "MCS") pertence = true;
            if (nM.includes("MONTANHOSAS") && areaIPMA === "MAM") pertence = true;
            if (areaIPMA === "MAM" && !nM.includes("PORTO SANTO")) pertence = true;

            if (pertence && a.awarenessLevelID !== 'green') {
                const dIn = Math.max(aStart, tInicio);
                const dOut = Math.min(aEnd, tFim);

                avisosHtml += `
                <div class="aviso-item">
                    <div class="aviso-topo">
                        <img src="icons/${a.awarenessTypeName}.svg" onerror="this.src='icons/Alerta.svg'" class="aviso-img">
                        <span style="color:${cores[a.awarenessLevelID]}; font-weight:bold;">${a.awarenessTypeName}</span>
                    </div>
                    <span class="aviso-tempo">Das ${new Date(dIn).getHours()}h às ${new Date(dOut).getHours()}h</span>
                    <span class="aviso-desc">${a.text}</span>
                </div>`;
            }
        }
    });

    return html + (avisosHtml || "<div>✅ Sem avisos ativos para este dia.</div>");
}

inicializar();
</script>
</body>
</html>
